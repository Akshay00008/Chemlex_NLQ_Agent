<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemelex - Inventory Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <!-- Top Navigation -->
    <nav class="topnav">
        <div class="nav-left">
            <div class="nav-logo">Chemelex</div>
            <span class="nav-divider"></span>
            <span class="nav-title">Inventory Intelligence</span>
        </div>
        <div class="nav-center">
            <button class="tab-btn active" id="tabDashboard" onclick="switchTab('dashboard')">Dashboard</button>
            <button class="tab-btn" id="tabChat" onclick="switchTab('chat')">Chat</button>
        </div>
        <div class="nav-right">
            <div class="nav-user">
                <div class="user-avatar">{{ user_name[0] | upper }}</div>
                <span class="user-name">{{ user_name }}</span>
            </div>
            <button class="nav-btn" onclick="logout()" title="Sign out">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
        </div>
    </nav>

    <div class="app-layout">
        <!-- Sidebar: Conversation History (visible in chat tab) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Conversations</h3>
                <button class="btn-new-chat" onclick="newConversation()" title="New conversation">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
            <div class="conversation-list" id="conversationList">
                <!-- Populated by JS -->
            </div>
        </aside>

        <!-- ══════ DASHBOARD VIEW ══════ -->
        <main class="main-content view-dashboard" id="viewDashboard">
            <!-- KPI Cards Row -->
            <div class="kpi-bar">
                <div class="kpi-grid" id="kpiGrid">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Charts Grid -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h4>Top Plants by Inventory Value</h4>
                    <div id="chartTopPlants" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h4>Inventory by Material Type</h4>
                    <div id="chartMaterialType" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h4>Below Safety Stock by Plant</h4>
                    <div id="chartBelowSS" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h4>Inventory Composition</h4>
                    <div id="chartComposition" class="chart-container"></div>
                </div>
            </div>
        </main>

        <!-- ══════ CHAT VIEW ══════ -->
        <main class="main-content view-chat hidden" id="viewChat">
            <!-- Compact KPI Strip -->
            <div class="kpi-strip" id="kpiStrip">
                <!-- Populated by JS -->
            </div>

            <!-- Quick Questions -->
            <div class="quick-questions" id="quickQuestions">
                <div class="qq-grid">
                    <button class="qq-btn" onclick="askQuestion(this.textContent)">What is the total inventory value by plant?</button>
                    <button class="qq-btn" onclick="askQuestion(this.textContent)">Top 10 materials by shelf stock value</button>
                    <button class="qq-btn" onclick="askQuestion(this.textContent)">ABC classification breakdown with values</button>
                    <button class="qq-btn" onclick="askQuestion(this.textContent)">Which materials are below safety stock?</button>
                    <button class="qq-btn" onclick="askQuestion(this.textContent)">Show shelf stock for SENSORS by plant</button>
                    <button class="qq-btn" onclick="askQuestion(this.textContent)">Average days on hand by material type</button>
                </div>
            </div>

            <!-- Messages -->
            <div class="chat-messages" id="chatMessages">
                <!-- Populated by JS -->
            </div>

            <!-- Input -->
            <div class="chat-input-wrap">
                <form class="chat-form" id="chatForm" onsubmit="handleSubmit(event)">
                    <input type="text" id="chatInput" placeholder="Ask about inventory, materials, stock levels, demand..." autocomplete="off">
                    <button type="submit" id="sendBtn" class="send-btn" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </form>
                <p class="input-hint">Powered by AI &mdash; responses are generated from your inventory database</p>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
